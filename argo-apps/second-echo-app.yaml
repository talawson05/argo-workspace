apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: second-echo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com' # Replace with your Git repo URL
    targetRevision: HEAD
    path: second-echo
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: 'https://default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
